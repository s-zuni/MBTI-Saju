version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React
  - TailwindCSS
  - Lucide React
  - Supabase
  - Google Gemini AI (via AI SDK)
routes:
  - path: /
    file: src/components/HeroSection.tsx
    auth_required: false
    description: Main landing page with hero and feature grids
  - path: /fortune
    file: src/pages/FortunePage.tsx
    auth_required: false
    description: Daily fortune and service portal
  - path: /chat
    file: src/pages/ChatPage.tsx
    auth_required: true
    description: AI-driven deep destiny counseling chat
  - path: /community
    file: src/components/CommunityPage.tsx
    auth_required: false
    description: Community post list and interaction
  - path: /mypage
    file: src/components/MyPage.tsx
    auth_required: true
    description: User profile and usage history dashboard
  - path: /pricing
    file: src/pages/PricingPage.tsx
    auth_required: false
    description: Credit purchase plans
  - path: /usage-history
    file: src/pages/UsageHistoryPage.tsx
    auth_required: true
    description: Credit usage and purchase logs
  - path: /relationship
    file: src/pages/RelationshipPage.tsx
    auth_required: true
    description: Relationship compatibility analysis
features:
  - name: MBTI & Saju Analysis
    description: Comprehensive personality analysis combining MBTI and Saju
    files:
      - src/components/MbtiSajuModal.tsx
      - src/components/AnalysisModal.tsx
    entry_route: /
    user_interactions:
      - Click "시작하기" button
      - Fill birth date and MBTI info
      - View analyzed results
    auth_required: true
  - name: Community Interaction
    description: Browsing and creating community posts
    files:
      - src/components/CommunityPage.tsx
    entry_route: /community
    user_interactions:
      - Scroll through post list
      - Use search bar
      - Click on tags to filter
      - Click "글쓰기" to create a post
      - Click "좋아요" to like a post
    auth_required: false
  - name: Deep Counseling Chat
    description: Interactive AI chat for personalized life counseling
    files:
      - src/pages/ChatPage.tsx
    entry_route: /chat
    user_interactions:
      - Select a counseling theme
      - Type messages in the chat input
      - Receive AI responses in real-time
    auth_required: true
  - name: Credit Management
    description: Purchasing and consuming service credits
    files:
      - src/pages/PricingPage.tsx
      - src/components/CreditPurchaseModal.tsx
    entry_route: /pricing
    user_interactions:
      - Select a credit pack
      - Click buy button
      - Complete payment flow via Toss Payments
    auth_required: true
known_limitations:
  - issue: Chat history is not persistent across sessions for all tiers
    location: src/pages/ChatPage.tsx
    impact: Users might lose chat context upon refresh if not saved to Supabase
